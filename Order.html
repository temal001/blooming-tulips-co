        <a href="Order.html?item=favorites3"><img src="images/favorites3.jpg"></a>

<section class="order-section">

    <div class="product-info">
        <a href="Order.html" class="back-arrow">← Back to bouquets</a>

        <img id="product-image" src="" alt="Bouquet Image">
        
        <div class="product-details">
            <h1 id="product-name"></h1>
            <p id="product-description"></p>
            <p id="product-price" class="price"></p>
        </div>
    </div>

    <form class="order-form">
        <h2>Start Your Order Here</h2>

        <label>Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Delivery Address</label>
        <textarea required></textarea>
        
        <label>Phone Number</label>
        <input type="tel" required pattern="\d{3}[-]\d{3}[-]\d{4}" placeholder="123‑456‑7890">


        <label>Delivery Date</label>
        <input type="date" required>

        <label>Message On Card (optional)</label>
        <textarea></textarea>

        <button type="submit">Place Order</button>
    </form>

</section>

<script src="order.js"></script>
